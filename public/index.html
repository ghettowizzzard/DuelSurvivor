<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#03030c">
    <title>Duelio - Play Now</title>

    <style>
        :root {
            --site-vh: 1vh;
            --site-pad: clamp(10px, 2vw, 18px);
            --frame-radius: 18px;
            --frame-border: rgba(56, 189, 248, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: #03030c;
            color: #e0f2fe;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-image:
                radial-gradient(circle at 20% 18%, rgba(14, 165, 233, 0.20), transparent 32%),
                radial-gradient(circle at 84% 22%, rgba(217, 70, 239, 0.15), transparent 34%),
                radial-gradient(circle at 50% 92%, rgba(250, 204, 21, 0.09), transparent 34%),
                radial-gradient(circle at center, rgba(14, 165, 233, 0.10), rgba(0, 0, 0, 0.94)),
                url("./assets/seamless-bg.png");
            background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, repeat;
            background-size: cover, cover, cover, cover, 512px 512px;
            background-position: center, center, center, center, center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(rgba(103, 232, 249, 0.10) 1px, transparent 1px),
                linear-gradient(90deg, rgba(103, 232, 249, 0.08) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(circle at 50% 36%, black 0%, transparent 72%);
            opacity: 0.16;
        }

        .site-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: calc(var(--site-vh) * 100);
            display: grid;
            grid-template-rows: minmax(0, auto) auto;
            gap: 14px;
            padding: var(--site-pad);
        }

        .site-game-shell {
            width: min(calc(100vw - (var(--site-pad) * 2)), 1600px);
            margin: 0 auto;
            display: grid;
            gap: 8px;
        }

        .game-frame-wrap {
            position: relative;
            width: 100%;
            height: min(calc((var(--site-vh) * 100) - (var(--site-pad) * 2) - 42px), 900px);
            min-height: 560px;
            border: 2px solid var(--frame-border);
            border-radius: var(--frame-radius);
            overflow: hidden;
            box-shadow:
                0 0 44px rgba(14, 165, 233, 0.30),
                0 0 120px rgba(0, 0, 0, 0.75),
                inset 0 0 24px rgba(255,255,255,0.035);
            background: #020617;
            touch-action: none;
        }

        .game-frame-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            border-radius: inherit;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.08), transparent 26%, transparent 74%, rgba(103,232,249,0.07)),
                radial-gradient(circle at 72% 12%, rgba(250,204,21,0.09), transparent 28%);
        }

        iframe {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #03030c;
        }

        .site-controls {
            position: relative;
            z-index: 6;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            min-height: 34px;
            pointer-events: none;
        }

        .site-control-btn {
            pointer-events: auto;
            border: 1px solid rgba(103, 232, 249, 0.46);
            background: rgba(2, 6, 23, 0.72);
            color: #e0f2fe;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 22px rgba(14, 165, 233, 0.18);
            transition: transform 0.16s ease, opacity 0.18s ease, border-color 0.16s ease, background 0.16s ease;
        }

        .site-control-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(250, 204, 21, 0.72);
            background: rgba(15, 23, 42, 0.86);
        }

        .site-control-btn:active {
            transform: translateY(1px) scale(0.97);
        }

        .site-game-shell:fullscreen,
        .site-game-shell:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            display: block;
            background: #03030c;
        }

        .site-game-shell:fullscreen .game-frame-wrap,
        .site-game-shell:-webkit-full-screen .game-frame-wrap {
            width: 100vw;
            height: 100vh;
            min-height: 100vh;
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .site-game-shell:fullscreen .site-controls,
        .site-game-shell:-webkit-full-screen .site-controls {
            position: fixed;
            top: 50%;
            right: 0;
            z-index: 20;
            min-height: 0;
            padding: 0;
            transform: translate(82%, -50%);
            opacity: 0.20;
            transition: transform 0.22s ease, opacity 0.22s ease;
        }

        .site-game-shell:fullscreen .site-controls:hover,
        .site-game-shell:fullscreen .site-controls:focus-within,
        .site-game-shell:-webkit-full-screen .site-controls:hover,
        .site-game-shell:-webkit-full-screen .site-controls:focus-within {
            transform: translate(0, -50%);
            opacity: 1;
        }

        .site-game-shell:fullscreen .site-control-btn,
        .site-game-shell:-webkit-full-screen .site-control-btn {
            border-radius: 999px 0 0 999px;
            padding: 10px 12px;
            background: rgba(2, 6, 23, 0.66);
        }

        .site-banner-panel {
            width: min(calc(100vw - (var(--site-pad) * 2)), 1600px);
            margin: 2px auto 20px;
            padding: clamp(6px, 1vw, 12px);
            border: 0;
            border-radius: 20px;
            overflow: visible;
            background:
                radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.10), transparent 58%);
        }

        .site-banner-link,
        .site-banner-img {
            display: block;
            width: 100%;
        }

        .site-banner-link {
            line-height: 0;
        }

        .site-banner-img {
            height: auto;
            max-height: none;
            object-fit: contain;
            object-position: center;
            background: transparent;
            filter: drop-shadow(0 16px 34px rgba(0,0,0,0.42)) drop-shadow(0 0 18px rgba(14,165,233,0.16));
        }

        .site-loader {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 30%, rgba(14, 165, 233, 0.22), transparent 32%),
                radial-gradient(circle at 64% 70%, rgba(217, 70, 239, 0.16), transparent 34%),
                #03030c;
            transition: opacity 0.42s ease, visibility 0.42s ease;
        }

        .site-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-card {
            width: min(420px, calc(100vw - 36px));
            border: 1px solid rgba(103, 232, 249, 0.38);
            border-radius: 24px;
            padding: 26px;
            text-align: center;
            background:
                radial-gradient(circle at 16% 0%, rgba(103, 232, 249, 0.16), transparent 40%),
                linear-gradient(135deg, rgba(2, 6, 23, 0.92), rgba(15, 23, 42, 0.72));
            box-shadow: 0 0 46px rgba(14, 165, 233, 0.24), 0 26px 90px rgba(0,0,0,0.55);
        }

        .loader-mark {
            width: 58px;
            height: 58px;
            margin: 0 auto 14px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            transform: rotate(45deg);
            border: 1px solid rgba(103, 232, 249, 0.55);
            background: linear-gradient(135deg, #0ea5e9, #06b6d4, #facc15);
            box-shadow: 0 0 28px rgba(34, 211, 238, 0.34);
        }

        .loader-mark span {
            transform: rotate(-45deg);
            color: white;
            font-weight: 900;
            font-size: 20px;
        }

        .loader-title {
            color: #f8fafc;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .loader-subtitle {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .loader-bar {
            position: relative;
            height: 8px;
            margin-top: 20px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(103, 232, 249, 0.18);
        }

        .loader-bar::before {
            content: "";
            position: absolute;
            inset: 0;
            transform-origin: left center;
            animation: loaderFill 1.15s ease-in-out forwards;
            background: linear-gradient(90deg, #22d3ee, #a78bfa, #facc15);
        }

        @keyframes loaderFill {
            from { transform: scaleX(0.05); }
            to { transform: scaleX(1); }
        }

        @media (max-width: 900px) {
            :root {
                --site-pad: 0px;
                --frame-radius: 0px;
            }

            .site-shell {
                gap: 0;
            }

            .site-game-shell {
                width: 100vw;
                gap: 6px;
            }

            .game-frame-wrap {
                width: 100vw;
                height: calc((var(--site-vh) * 100) - 40px);
                min-height: calc((var(--site-vh) * 100) - 40px);
                border-radius: 0;
                border: 0;
                box-shadow: none;
            }

            .site-controls {
                justify-content: center;
                min-height: 34px;
                padding-bottom: 6px;
            }

            .site-control-btn {
                padding: 8px 10px;
                font-size: 10px;
                background: rgba(2, 6, 23, 0.74);
            }

            .site-banner-panel {
                width: 100vw;
                margin: 6px 0 0;
                padding: 6px 10px 12px;
                border-radius: 0;
            }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            .site-banner-panel {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .loader-bar::before {
                animation: none;
                transform: scaleX(1);
            }

            .site-loader {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div id="site-loader" class="site-loader" aria-live="polite" aria-label="Loading Duelio">
        <div class="loader-card">
            <div class="loader-mark"><span>DS</span></div>
            <div class="loader-title">Duel.io</div>
            <div class="loader-subtitle">Preparing survivor portal...</div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <main class="site-shell">
        <div id="site-game-shell" class="site-game-shell">
            <div id="game-frame-wrap" class="game-frame-wrap">
                <iframe
                    id="duelio-frame"
                    src="./play.html"
                    title="Duelio Game"
                    allow="fullscreen; microphone; autoplay; gamepad"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="site-controls" aria-label="Game display controls">
                <button id="fullscreen-btn" class="site-control-btn" type="button">FULLSCREEN</button>
            </div>
        </div>

        <section id="site-banner-panel" class="site-banner-panel" aria-label="Duelio update banner">
            <a id="site-banner-link" class="site-banner-link" href="#game-frame-wrap" aria-label="Return to Duelio game">
                <img id="site-banner-img" class="site-banner-img" alt="Duelio update banner" loading="lazy">
            </a>
        </section>
    </main>

    <script>
        const SITE_BANNERS = [
            "./assets/BannerV1.png",
            "./assets/BannerV2.png"
        ];

        function setSiteViewportHeight() {
            document.documentElement.style.setProperty("--site-vh", `${window.innerHeight * 0.01}px`);
        }

        function pickSiteBanner() {
            const panel = document.getElementById("site-banner-panel");
            const img = document.getElementById("site-banner-img");
            if (!panel || !img || !SITE_BANNERS.length) return;

            const src = SITE_BANNERS[Math.floor(Math.random() * SITE_BANNERS.length)];
            img.src = src;

            img.onerror = () => {
                panel.style.display = "none";
            };
        }

        function hideSiteLoader() {
            const loader = document.getElementById("site-loader");
            if (!loader) return;
            loader.classList.add("hidden");
            setTimeout(() => loader.remove(), 700);
        }

        function setupFullscreenButton() {
            const button = document.getElementById("fullscreen-btn");
            const shell = document.getElementById("site-game-shell");
            if (!button || !shell) return;

            button.addEventListener("click", async () => {
                try {
                    if (!document.fullscreenElement) {
                        await shell.requestFullscreen();
                        button.textContent = "EXIT FULLSCREEN";
                    } else {
                        await document.exitFullscreen();
                        button.textContent = "FULLSCREEN";
                    }
                } catch (error) {
                    button.textContent = "FULLSCREEN BLOCKED";
                    setTimeout(() => { button.textContent = document.fullscreenElement ? "EXIT FULLSCREEN" : "FULLSCREEN"; }, 1200);
                }
            });

            document.addEventListener("fullscreenchange", () => {
                button.textContent = document.fullscreenElement ? "EXIT FULLSCREEN" : "FULLSCREEN";
            });
        }

        setSiteViewportHeight();
        window.addEventListener("resize", setSiteViewportHeight, { passive: true });
        window.addEventListener("orientationchange", () => setTimeout(setSiteViewportHeight, 180), { passive: true });

        pickSiteBanner();
        setupFullscreenButton();

        const frame = document.getElementById("duelio-frame");
        const loaderStart = performance.now();
        const minLoaderMs = 850;
        let loaderDone = false;

        function finishLoaderOnce() {
            if (loaderDone) return;
            loaderDone = true;
            const elapsed = performance.now() - loaderStart;
            setTimeout(hideSiteLoader, Math.max(0, minLoaderMs - elapsed));
        }

        if (frame) frame.addEventListener("load", finishLoaderOnce, { once: true });
        setTimeout(finishLoaderOnce, 2600);
    </script>
</body>
</html>
