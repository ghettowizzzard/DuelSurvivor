<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duelio - Play Now</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #03030c;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background-image:
                radial-gradient(circle at center, rgba(14, 165, 233, 0.14), rgba(0, 0, 0, 0.92)),
                url("./assets/seamless-bg.png");
            background-repeat: no-repeat, repeat;
            background-size: cover, 512px 512px;
            background-position: center, center;
        }

        .site-shell {
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            box-sizing: border-box;
        }

        .game-frame-wrap {
            width: min(100vw - 36px, 1600px);
            height: min(100vh - 36px, 900px);
            border: 2px solid rgba(56, 189, 248, 0.45);
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(14, 165, 233, 0.28),
                0 0 120px rgba(0, 0, 0, 0.75);
            background: #020617;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #03030c;
        }

        @media (max-width: 900px) {
            .site-shell {
                padding: 0;
            }

            .game-frame-wrap {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: 0;
            }
        }
    </style>
</head>
<body>
    <main class="site-shell">
        <div class="game-frame-wrap">
            <iframe
                src="./play.html"
                title="Duelio Game"
                allow="fullscreen; microphone; autoplay; gamepad"
                allowfullscreen>
            </iframe>
        </div>
    </main>
</body>
</html>
