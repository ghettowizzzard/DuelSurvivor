<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#03030c">
    <title>Duelio - Play Now</title>

    <style>
        :root {
            --site-vh: 1vh;
            --site-vw: 1vw;
            --site-pad: clamp(10px, 2vw, 18px);
            --frame-radius: 18px;
            --frame-border: rgba(56, 189, 248, 0.45);
            --site-safe-top: env(safe-area-inset-top);
            --site-safe-right: env(safe-area-inset-right);
            --site-safe-bottom: env(safe-area-inset-bottom);
            --site-safe-left: env(safe-area-inset-left);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: #03030c;
            color: #e0f2fe;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-image:
                radial-gradient(circle at 20% 18%, rgba(14, 165, 233, 0.20), transparent 32%),
                radial-gradient(circle at 84% 22%, rgba(217, 70, 239, 0.15), transparent 34%),
                radial-gradient(circle at 50% 92%, rgba(250, 204, 21, 0.09), transparent 34%),
                radial-gradient(circle at center, rgba(14, 165, 233, 0.10), rgba(0, 0, 0, 0.94)),
                url("./assets/seamless-bg.png");
            background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, repeat;
            background-size: cover, cover, cover, cover, 512px 512px;
            background-position: center, center, center, center, center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(rgba(103, 232, 249, 0.10) 1px, transparent 1px),
                linear-gradient(90deg, rgba(103, 232, 249, 0.08) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(circle at 50% 36%, black 0%, transparent 72%);
            opacity: 0.16;
        }

        .site-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: calc(var(--site-vh) * 100);
            display: grid;
            grid-template-rows: minmax(0, auto) auto;
            gap: 14px;
            padding: var(--site-pad);
        }

        .site-game-shell {
            width: min(calc((var(--site-vw) * 100) - (var(--site-pad) * 2)), 1600px);
            margin: 0 auto;
            display: grid;
            gap: 8px;
        }

        .game-frame-wrap {
            position: relative;
            width: 100%;
            height: min(calc((var(--site-vh) * 100) - (var(--site-pad) * 2) - 42px), 900px);
            min-height: min(560px, calc((var(--site-vh) * 100) - 42px));
            border: 2px solid var(--frame-border);
            border-radius: var(--frame-radius);
            overflow: hidden;
            box-shadow:
                0 0 44px rgba(14, 165, 233, 0.30),
                0 0 120px rgba(0, 0, 0, 0.75),
                inset 0 0 24px rgba(255,255,255,0.035);
            background: #020617;
            touch-action: none;
        }

        .game-frame-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            border-radius: inherit;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.08), transparent 26%, transparent 74%, rgba(103,232,249,0.07)),
                radial-gradient(circle at 72% 12%, rgba(250,204,21,0.09), transparent 28%);
        }

        iframe {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #03030c;
        }

        .site-controls {
            position: relative;
            z-index: 6;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            min-height: 34px;
            pointer-events: none;
        }

        .site-control-btn {
            pointer-events: auto;
            border: 1px solid rgba(103, 232, 249, 0.46);
            background: rgba(2, 6, 23, 0.72);
            color: #e0f2fe;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 22px rgba(14, 165, 233, 0.18);
            transition: transform 0.16s ease, opacity 0.18s ease, border-color 0.16s ease, background 0.16s ease;
        }

        .site-control-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(250, 204, 21, 0.72);
            background: rgba(15, 23, 42, 0.86);
        }

        .site-control-btn:active {
            transform: translateY(1px) scale(0.97);
        }

        .site-game-shell:fullscreen,
        .site-game-shell:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            display: block;
            background: #03030c;
        }

        .site-game-shell:fullscreen .game-frame-wrap,
        .site-game-shell:-webkit-full-screen .game-frame-wrap {
            width: 100vw;
            height: 100vh;
            min-height: 100vh;
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .site-game-shell:fullscreen .site-controls,
        .site-game-shell:-webkit-full-screen .site-controls {
            position: fixed;
            top: 50%;
            right: 0;
            z-index: 20;
            min-height: 0;
            padding: 0;
            transform: translate(82%, -50%);
            opacity: 0.20;
            transition: transform 0.22s ease, opacity 0.22s ease;
        }

        .site-game-shell:fullscreen .site-controls:hover,
        .site-game-shell:fullscreen .site-controls:focus-within,
        .site-game-shell:-webkit-full-screen .site-controls:hover,
        .site-game-shell:-webkit-full-screen .site-controls:focus-within {
            transform: translate(0, -50%);
            opacity: 1;
        }

        .site-game-shell:fullscreen .site-control-btn,
        .site-game-shell:-webkit-full-screen .site-control-btn {
            border-radius: 999px 0 0 999px;
            padding: 10px 12px;
            background: rgba(2, 6, 23, 0.66);
        }

        .site-banner-panel {
            width: min(calc(100vw - (var(--site-pad) * 2)), 1600px);
            margin: 2px auto 20px;
            padding: clamp(6px, 1vw, 12px);
            border: 0;
            border-radius: 20px;
            overflow: visible;
            background:
                radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.10), transparent 58%);
        }

        .site-banner-float-wrap {
            position: relative;
            width: 100%;
            transform: translateY(0);
            will-change: auto;
        }

        .site-banner-panel.banner-visible .site-banner-float-wrap {
            animation: siteBannerFloat 4.8s ease-in-out infinite;
            will-change: transform;
        }

        .site-banner-link,
        .site-banner-img {
            display: block;
            width: 100%;
        }

        .site-banner-link {
            line-height: 0;
        }

        .site-banner-img {
            height: auto;
            max-height: none;
            object-fit: contain;
            object-position: center;
            background: transparent;
            filter: drop-shadow(0 16px 34px rgba(0,0,0,0.42)) drop-shadow(0 0 18px rgba(14,165,233,0.16));
        }

        .site-support-wrap {
            position: relative;
            z-index: 5;
            width: min(620px, calc(100% - 32px));
            margin: clamp(-14px, -1.4vw, -8px) auto 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .site-support-btn {
            position: relative;
            isolation: isolate;
            min-height: 74px;
            width: min(520px, 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 16px 92px;
            border-radius: 999px;
            border: 1px solid rgba(250, 204, 21, 0.62);
            background:
                radial-gradient(circle at 18% 12%, rgba(56, 189, 248, 0.28), transparent 34%),
                radial-gradient(circle at 82% 88%, rgba(248, 113, 113, 0.24), transparent 36%),
                linear-gradient(135deg, rgba(2, 6, 23, 0.94), rgba(15, 23, 42, 0.82));
            color: #f8fafc;
            text-decoration: none;
            overflow: visible;
            pointer-events: auto;
            box-shadow:
                0 18px 44px rgba(0,0,0,0.42),
                0 0 26px rgba(250, 204, 21, 0.18),
                inset 0 0 22px rgba(255,255,255,0.04);
            transition: transform 0.18s ease, border-color 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }

        .site-support-btn::before {
            content: "";
            position: absolute;
            inset: 3px;
            z-index: -1;
            border-radius: inherit;
            background:
                linear-gradient(90deg, rgba(34,211,238,0.18), transparent 34%, transparent 66%, rgba(248,113,113,0.18));
            opacity: 0.9;
        }

        .site-support-btn:hover {
            transform: translateY(-2px) scale(1.018);
            border-color: rgba(250, 204, 21, 0.92);
            filter: brightness(1.08);
            box-shadow:
                0 22px 52px rgba(0,0,0,0.48),
                0 0 34px rgba(250, 204, 21, 0.28),
                0 0 24px rgba(56, 189, 248, 0.16);
        }

        .site-support-btn:active {
            transform: translateY(1px) scale(0.985);
        }

        .support-copy {
            display: grid;
            gap: 2px;
            text-align: center;
            text-transform: uppercase;
        }

        .support-kicker {
            color: #67e8f9;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.18em;
        }

        .support-title {
            color: #facc15;
            font-size: clamp(18px, 2vw, 26px);
            font-weight: 900;
            letter-spacing: 0.10em;
            text-shadow: 0 0 18px rgba(250, 204, 21, 0.32);
        }

        .support-subtitle {
            color: #cbd5e1;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .support-character {
            --fighter-main: #38bdf8;
            --fighter-dark: #075985;
            --fighter-glow: rgba(56, 189, 248, 0.72);
            --fighter-highlight: rgba(255, 255, 255, 0.42);
            position: absolute;
            z-index: 4;
            width: clamp(82px, 8vw, 126px);
            aspect-ratio: 1;
            pointer-events: none;
            user-select: none;
            transform-style: preserve-3d;
            filter:
                drop-shadow(0 0 3px rgba(255,255,255,0.95))
                drop-shadow(0 0 14px var(--fighter-glow))
                drop-shadow(0 16px 18px rgba(0,0,0,0.38));
        }

        .support-character::before {
            content: "";
            position: absolute;
            inset: 15%;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.92);
            background:
                radial-gradient(circle at 32% 24%, var(--fighter-highlight), transparent 22%),
                radial-gradient(circle at 68% 76%, rgba(0,0,0,0.30), transparent 34%),
                linear-gradient(135deg, var(--fighter-main), var(--fighter-dark));
            box-shadow:
                inset -10px -14px 18px rgba(0,0,0,0.28),
                inset 7px 7px 12px rgba(255,255,255,0.20),
                0 0 0 5px rgba(2,6,23,0.82),
                0 0 24px var(--fighter-glow);
        }

        .support-character::after {
            content: "";
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.22);
            box-shadow: inset 0 0 18px rgba(255,255,255,0.08);
        }

        .fighter-eye {
            position: absolute;
            z-index: 3;
            width: 13%;
            height: 13%;
            border-radius: 50%;
            background: #f8fafc;
            box-shadow: 0 0 0 2px rgba(2,6,23,0.82), 0 0 8px rgba(255,255,255,0.36);
        }

        .fighter-eye::after {
            content: "";
            position: absolute;
            width: 45%;
            height: 45%;
            border-radius: 50%;
            background: #020617;
        }

        .fighter-brow {
            position: absolute;
            z-index: 4;
            width: 18%;
            height: 4%;
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.86);
            box-shadow: 0 0 6px rgba(0,0,0,0.28);
        }

        .fighter-arm {
            position: absolute;
            z-index: 2;
            width: 38%;
            height: 14%;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,0.82);
            background: linear-gradient(135deg, var(--fighter-main), var(--fighter-dark));
            box-shadow: inset -6px -5px 9px rgba(0,0,0,0.22), 0 0 12px var(--fighter-glow);
        }

        .fighter-fist {
            position: absolute;
            z-index: 5;
            width: 30%;
            height: 30%;
            border-radius: 42% 48% 45% 50%;
            border: 3px solid rgba(255,255,255,0.92);
            background:
                radial-gradient(circle at 30% 28%, rgba(255,255,255,0.42), transparent 22%),
                linear-gradient(135deg, var(--fighter-main), var(--fighter-dark));
            box-shadow:
                inset -7px -8px 10px rgba(0,0,0,0.25),
                0 0 0 4px rgba(2,6,23,0.78),
                0 0 16px var(--fighter-glow);
        }

        .fighter-fist::before,
        .fighter-fist::after {
            content: "";
            position: absolute;
            top: 18%;
            width: 23%;
            height: 28%;
            border-radius: 999px;
            background: rgba(255,255,255,0.28);
        }

        .fighter-fist::before {
            left: 22%;
        }

        .fighter-fist::after {
            right: 22%;
        }

        .support-character-blue {
            --fighter-main: #38bdf8;
            --fighter-dark: #075985;
            --fighter-glow: rgba(56, 189, 248, 0.72);
            left: clamp(-28px, -2vw, -10px);
            top: clamp(-42px, -3vw, -24px);
            transform: rotate(-12deg);
        }

        .support-character-blue .fighter-eye-left {
            left: 41%;
            top: 39%;
        }

        .support-character-blue .fighter-eye-right {
            left: 58%;
            top: 49%;
        }

        .support-character-blue .fighter-eye::after {
            right: 8%;
            bottom: 8%;
        }

        .support-character-blue .fighter-brow-left {
            left: 37%;
            top: 34%;
            transform: rotate(22deg);
        }

        .support-character-blue .fighter-brow-right {
            left: 55%;
            top: 43%;
            transform: rotate(22deg);
        }

        .support-character-blue .fighter-arm {
            right: 5%;
            bottom: 18%;
            transform: rotate(35deg);
        }

        .support-character-blue .fighter-fist {
            right: -6%;
            bottom: 6%;
            transform: rotate(28deg);
        }

        .support-character-red {
            --fighter-main: #fb7185;
            --fighter-dark: #991b1b;
            --fighter-glow: rgba(248, 113, 113, 0.72);
            right: clamp(-28px, -2vw, -10px);
            bottom: clamp(-38px, -3vw, -22px);
            transform: rotate(12deg);
        }

        .support-character-red .fighter-eye-left {
            right: 58%;
            bottom: 49%;
        }

        .support-character-red .fighter-eye-right {
            right: 41%;
            bottom: 39%;
        }

        .support-character-red .fighter-eye::after {
            left: 8%;
            top: 8%;
        }

        .support-character-red .fighter-brow-left {
            right: 55%;
            bottom: 43%;
            transform: rotate(22deg);
        }

        .support-character-red .fighter-brow-right {
            right: 37%;
            bottom: 34%;
            transform: rotate(22deg);
        }

        .support-character-red .fighter-arm {
            left: 5%;
            top: 18%;
            transform: rotate(35deg);
        }

        .support-character-red .fighter-fist {
            left: -6%;
            top: 6%;
            transform: rotate(208deg);
        }

        /* --- BUY ME A COFFEE SUPPORT FIGHTERS ---
           Matches the actual in-game top-down character style:
           solid circular body, black outline, two small forward hands. */
        .support-character {
            --fighter-body: #22d3ee;
            --fighter-hand: #38bdf8;
            --fighter-outline: #020617;
            --fighter-glow: rgba(56, 189, 248, 0.72);

            position: absolute;
            z-index: 4;
            width: clamp(74px, 7.2vw, 108px);
            aspect-ratio: 1;
            pointer-events: none;
            user-select: none;
            transform-origin: 50% 50%;
            filter:
                drop-shadow(0 0 10px var(--fighter-glow))
                drop-shadow(0 13px 16px rgba(0,0,0,0.42));
        }

        .support-character::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 64%;
            aspect-ratio: 1;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 4px solid var(--fighter-outline);
            background: var(--fighter-body);
            box-shadow:
                inset -5px -7px 0 rgba(0,0,0,0.16),
                inset 4px 4px 0 rgba(255,255,255,0.10),
                0 0 16px var(--fighter-glow);
        }

        .support-character::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 64%;
            aspect-ratio: 1;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 0 14px rgba(255,255,255,0.06);
        }

        .support-character .fighter-eye,
        .support-character .fighter-brow {
            display: none !important;
        }

        .fighter-arm,
        .fighter-fist {
            position: absolute;
            z-index: 6;
            width: 16%;
            aspect-ratio: 1;
            height: auto;
            border-radius: 50%;
            border: 3px solid var(--fighter-outline);
            background: var(--fighter-hand);
            box-shadow:
                inset -2px -3px 0 rgba(0,0,0,0.18),
                inset 2px 2px 0 rgba(255,255,255,0.14),
                0 0 9px var(--fighter-glow);
        }

        .fighter-arm {
            left: 67%;
            top: 28%;
        }

        .fighter-fist {
            left: 67%;
            bottom: 28%;
        }

        .fighter-fist::before,
        .fighter-fist::after {
            display: none !important;
        }

        .support-character-blue {
            --fighter-body: #22d3ee;
            --fighter-hand: #38bdf8;
            --fighter-glow: rgba(56, 189, 248, 0.72);

            left: clamp(-20px, -1.6vw, -8px);
            top: clamp(-34px, -2.6vw, -18px);
            transform: rotate(42deg);
        }

        .support-character-red {
            --fighter-body: #ef4444;
            --fighter-hand: #f59e0b;
            --fighter-glow: rgba(248, 113, 113, 0.72);

            right: clamp(-20px, -1.6vw, -8px);
            bottom: clamp(-34px, -2.6vw, -18px);
            transform: rotate(-138deg);
        }

        @keyframes siteBannerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .site-loader {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 30%, rgba(14, 165, 233, 0.22), transparent 32%),
                radial-gradient(circle at 64% 70%, rgba(217, 70, 239, 0.16), transparent 34%),
                #03030c;
            transition: opacity 0.42s ease, visibility 0.42s ease;
        }

        .site-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-card {
            width: min(420px, calc(100vw - 36px));
            border: 1px solid rgba(103, 232, 249, 0.38);
            border-radius: 24px;
            padding: 26px;
            text-align: center;
            background:
                radial-gradient(circle at 16% 0%, rgba(103, 232, 249, 0.16), transparent 40%),
                linear-gradient(135deg, rgba(2, 6, 23, 0.92), rgba(15, 23, 42, 0.72));
            box-shadow: 0 0 46px rgba(14, 165, 233, 0.24), 0 26px 90px rgba(0,0,0,0.55);
        }

        .loader-mark {
            width: 58px;
            height: 58px;
            margin: 0 auto 14px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            transform: rotate(45deg);
            border: 1px solid rgba(103, 232, 249, 0.55);
            background: linear-gradient(135deg, #0ea5e9, #06b6d4, #facc15);
            box-shadow: 0 0 28px rgba(34, 211, 238, 0.34);
        }

        .loader-mark span {
            transform: rotate(-45deg);
            color: white;
            font-weight: 900;
            font-size: 20px;
        }

        .loader-title {
            color: #f8fafc;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .loader-subtitle {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .loader-bar {
            position: relative;
            height: 8px;
            margin-top: 20px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(103, 232, 249, 0.18);
        }

        .loader-bar::before {
            content: "";
            position: absolute;
            inset: 0;
            transform-origin: left center;
            animation: loaderFill 1.15s ease-in-out forwards;
            background: linear-gradient(90deg, #22d3ee, #a78bfa, #facc15);
        }

        @keyframes loaderFill {
            from { transform: scaleX(0.05); }
            to { transform: scaleX(1); }
        }

        @media (max-width: 900px) {
            :root {
                --site-pad: 0px;
                --frame-radius: 0px;
            }

            html,
            body {
                width: calc(var(--site-vw) * 100);
                min-height: calc(var(--site-vh) * 100);
                overflow-x: hidden;
            }

            .site-shell {
                min-height: calc(var(--site-vh) * 100);
                padding: 0;
                gap: 0;
            }

            .site-game-shell {
                width: calc(var(--site-vw) * 100);
                gap: 0;
            }

            .game-frame-wrap {
                width: calc(var(--site-vw) * 100);
                height: calc(var(--site-vh) * 100);
                min-height: calc(var(--site-vh) * 100);
                border-radius: 0;
                border: 0;
                box-shadow: none;
            }

            .site-controls {
                position: fixed;
                top: 50%;
                right: 0;
                z-index: 40;
                min-height: 0;
                padding: 0;
                justify-content: flex-end;
                pointer-events: auto;
                transform: translate(78%, -50%);
                opacity: 0.22;
                transition: transform 0.22s ease, opacity 0.22s ease;
            }

            .site-controls:hover,
            .site-controls:focus-within,
            .site-controls:active {
                transform: translate(0, -50%);
                opacity: 1;
            }

            .site-control-btn {
                border-radius: 999px 0 0 999px;
                padding: 10px 11px;
                font-size: 9px;
                background: rgba(2, 6, 23, 0.66);
            }

            .site-banner-panel {
                width: calc(var(--site-vw) * 100);
                margin: 6px 0 0;
                padding: 6px 10px 18px;
                border-radius: 0;
            }

            .site-support-wrap {
                width: min(94vw, 520px);
                margin-top: -4px;
            }

            .site-support-btn {
                min-height: 62px;
                padding: 12px 68px;
            }

            .support-kicker {
                font-size: 8px;
            }

            .support-title {
                font-size: clamp(15px, 5vw, 20px);
            }

            .support-subtitle {
                display: none;
            }

            .support-character {
                width: clamp(56px, 17vw, 78px);
            }

            .support-character-blue {
                left: -7px;
                top: -24px;
            }

            .support-character-red {
                right: -7px;
                bottom: -24px;
            }

            .fighter-arm,
            .fighter-fist {
                border-width: 2px;
            }

            .support-character::before {
                border-width: 3px;
                box-shadow:
                    inset -4px -6px 0 rgba(0,0,0,0.16),
                    inset 3px 3px 0 rgba(255,255,255,0.10),
                    0 0 12px var(--fighter-glow);
            }

            .support-character::after {
                border-width: 1px;
            }
        }

        /* --- FINAL DUEL.IO SUPPORT CHARACTER OVERRIDE ---
           This forces the website support characters to match the actual game/reference style:
           large circular body, thick dark outline, two attached smaller hand circles, no face. */
        .site-support-btn .support-character {
            --duel-body-top: #67e8f9;
            --duel-body-mid: #22d3ee;
            --duel-body-bottom: #0ea5e9;
            --duel-hand-top: #7dd3fc;
            --duel-hand-mid: #38bdf8;
            --duel-hand-bottom: #0284c7;
            --duel-outline: #061426;
            --duel-outer-line: rgba(56, 189, 248, 0.42);
            --duel-glow: rgba(56, 189, 248, 0.48);

            position: absolute !important;
            z-index: 5 !important;
            width: clamp(118px, 9vw, 154px) !important;
            height: auto !important;
            aspect-ratio: 1 / 1 !important;
            pointer-events: none !important;
            user-select: none !important;
            transform-style: flat !important;
            filter:
                drop-shadow(0 0 10px var(--duel-glow))
                drop-shadow(0 18px 18px rgba(0,0,0,0.42)) !important;
        }

        .site-support-btn .support-character::before {
            content: "" !important;
            position: absolute !important;
            z-index: 4 !important;
            left: 6% !important;
            top: 6% !important;
            width: 74% !important;
            height: 74% !important;
            border-radius: 50% !important;
            border: clamp(8px, 0.7vw, 11px) solid var(--duel-outline) !important;
            background:
                radial-gradient(circle at 34% 24%, rgba(255,255,255,0.30), transparent 18%),
                linear-gradient(180deg, var(--duel-body-top) 0%, var(--duel-body-mid) 48%, var(--duel-body-bottom) 100%) !important;
            box-shadow:
                inset 0 9px 0 rgba(255,255,255,0.13),
                inset -8px -14px 0 rgba(0,0,0,0.10),
                0 0 0 2px var(--duel-outer-line),
                0 0 18px var(--duel-glow) !important;
            transform: none !important;
        }

        .site-support-btn .support-character::after {
            content: "" !important;
            position: absolute !important;
            z-index: 6 !important;
            left: 15% !important;
            top: 14% !important;
            width: 56% !important;
            height: 22% !important;
            border-radius: 999px 999px 45% 45% !important;
            border-top: clamp(4px, 0.38vw, 6px) solid rgba(255,255,255,0.48) !important;
            background: transparent !important;
            box-shadow: none !important;
            opacity: 0.88 !important;
            pointer-events: none !important;
            transform: rotate(-2deg) !important;
        }

        .site-support-btn .fighter-eye,
        .site-support-btn .fighter-brow {
            display: none !important;
        }

        .site-support-btn .fighter-arm,
        .site-support-btn .fighter-fist {
            position: absolute !important;
            z-index: 3 !important;
            width: 32% !important;
            height: 32% !important;
            aspect-ratio: 1 / 1 !important;
            border-radius: 50% !important;
            border: clamp(7px, 0.58vw, 10px) solid var(--duel-outline) !important;
            background:
                radial-gradient(circle at 34% 24%, rgba(255,255,255,0.34), transparent 20%),
                linear-gradient(180deg, var(--duel-hand-top) 0%, var(--duel-hand-mid) 48%, var(--duel-hand-bottom) 100%) !important;
            box-shadow:
                inset 0 6px 0 rgba(255,255,255,0.14),
                inset -5px -8px 0 rgba(0,0,0,0.11),
                0 0 0 2px var(--duel-outer-line),
                0 0 13px var(--duel-glow) !important;
            transform: none !important;
        }

        .site-support-btn .fighter-arm::before,
        .site-support-btn .fighter-arm::after,
        .site-support-btn .fighter-fist::before,
        .site-support-btn .fighter-fist::after {
            display: none !important;
            content: none !important;
        }

        .site-support-btn .fighter-arm {
            left: 64% !important;
            top: 41% !important;
        }

        .site-support-btn .fighter-fist {
            left: 33% !important;
            top: 66% !important;
        }

        .site-support-btn .support-character-blue {
            --duel-body-top: #67e8f9;
            --duel-body-mid: #22d3ee;
            --duel-body-bottom: #0ea5e9;
            --duel-hand-top: #7dd3fc;
            --duel-hand-mid: #38bdf8;
            --duel-hand-bottom: #0284c7;
            --duel-outline: #061426;
            --duel-outer-line: rgba(56, 189, 248, 0.42);
            --duel-glow: rgba(56, 189, 248, 0.52);

            left: clamp(-36px, -2.6vw, -14px) !important;
            top: clamp(-52px, -3.8vw, -30px) !important;
            transform: rotate(-5deg) !important;
        }

        .site-support-btn .support-character-red {
            --duel-body-top: #fb7185;
            --duel-body-mid: #ef233c;
            --duel-body-bottom: #dc2626;
            --duel-hand-top: #fbbf24;
            --duel-hand-mid: #f59e0b;
            --duel-hand-bottom: #d97706;
            --duel-outline: #1a0608;
            --duel-outer-line: rgba(248, 113, 113, 0.42);
            --duel-glow: rgba(248, 113, 113, 0.52);

            right: clamp(-36px, -2.6vw, -14px) !important;
            bottom: clamp(-52px, -3.8vw, -30px) !important;
            transform: rotate(175deg) !important;
        }

        @media (max-width: 900px) {
            .site-support-btn .support-character {
                width: clamp(86px, 25vw, 112px) !important;
            }

            .site-support-btn .support-character-blue {
                left: -24px !important;
                top: -38px !important;
            }

            .site-support-btn .support-character-red {
                right: -24px !important;
                bottom: -38px !important;
            }

            .site-support-btn .support-character::before {
                border-width: 7px !important;
            }

            .site-support-btn .fighter-arm,
            .site-support-btn .fighter-fist {
                border-width: 6px !important;
            }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            .site-banner-panel {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .loader-bar::before {
                animation: none;
                transform: scaleX(1);
            }

            .site-loader {
                transition: none;
            }

            .site-banner-panel.banner-visible .site-banner-float-wrap {
                animation: none;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div id="site-loader" class="site-loader" aria-live="polite" aria-label="Loading Duelio">
        <div class="loader-card">
            <div class="loader-mark"><span>DS</span></div>
            <div class="loader-title">Duel.io</div>
            <div class="loader-subtitle">Preparing survivor portal...</div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <main class="site-shell">
        <div id="site-game-shell" class="site-game-shell">
            <div id="game-frame-wrap" class="game-frame-wrap">
                <iframe
                    id="duelio-frame"
                    src="./play.html"
                    title="Duelio Game"
                    allow="fullscreen; microphone; autoplay; gamepad"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="site-controls" aria-label="Game display controls">
                <button id="fullscreen-btn" class="site-control-btn" type="button">FULLSCREEN</button>
            </div>
        </div>

        <section id="site-banner-panel" class="site-banner-panel" aria-label="Duelio update banner and support link">
            <div class="site-banner-float-wrap">
                <a id="site-banner-link" class="site-banner-link" href="#game-frame-wrap" aria-label="Return to Duelio game">
                    <img id="site-banner-img" class="site-banner-img" alt="Duelio update banner" loading="lazy">
                </a>

                <div class="site-support-wrap">
                    <a
                        class="site-support-btn"
                        href="https://buymeacoffee.com/ghettowizard"
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label="Support Duel.io server costs on Buy Me a Coffee">

                        <span class="support-character support-character-blue" aria-hidden="true">
                            <span class="fighter-eye fighter-eye-left"></span>
                            <span class="fighter-eye fighter-eye-right"></span>
                            <span class="fighter-brow fighter-brow-left"></span>
                            <span class="fighter-brow fighter-brow-right"></span>
                            <span class="fighter-arm"></span>
                            <span class="fighter-fist"></span>
                        </span>

                        <span class="support-copy">
                            <span class="support-kicker">Support the server</span>
                            <span class="support-title">Buy Me a Coffee</span>
                            <span class="support-subtitle">Helps keep Duel.io online</span>
                        </span>

                        <span class="support-character support-character-red" aria-hidden="true">
                            <span class="fighter-eye fighter-eye-left"></span>
                            <span class="fighter-eye fighter-eye-right"></span>
                            <span class="fighter-brow fighter-brow-left"></span>
                            <span class="fighter-brow fighter-brow-right"></span>
                            <span class="fighter-arm"></span>
                            <span class="fighter-fist"></span>
                        </span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SITE_BANNERS = [
            "./assets/BannerV1.png",
            "./assets/BannerV2.png"
        ];

        function getSiteViewportSize() {
            const viewport = window.visualViewport;
            return {
                width: Math.max(320, Math.round(viewport?.width || document.documentElement.clientWidth || window.innerWidth || 320)),
                height: Math.max(240, Math.round(viewport?.height || document.documentElement.clientHeight || window.innerHeight || 240))
            };
        }

        function setSiteViewportHeight() {
            const size = getSiteViewportSize();
            document.documentElement.style.setProperty("--site-vw", `${size.width * 0.01}px`);
            document.documentElement.style.setProperty("--site-vh", `${size.height * 0.01}px`);
            document.documentElement.dataset.orientation = size.width > size.height ? "landscape" : "portrait";
        }

        function pickSiteBanner() {
            const panel = document.getElementById("site-banner-panel");
            const img = document.getElementById("site-banner-img");
            if (!panel || !img || !SITE_BANNERS.length) return;

            const src = SITE_BANNERS[Math.floor(Math.random() * SITE_BANNERS.length)];
            img.src = src;

            img.onerror = () => {
                panel.style.display = "none";
            };
        }

        function hideSiteLoader() {
            const loader = document.getElementById("site-loader");
            if (!loader) return;
            loader.classList.add("hidden");
            setTimeout(() => loader.remove(), 700);
        }

        function setupFullscreenButton() {
            const button = document.getElementById("fullscreen-btn");
            const shell = document.getElementById("site-game-shell");
            if (!button || !shell) return;

            button.addEventListener("click", async () => {
                try {
                    if (!document.fullscreenElement) {
                        await shell.requestFullscreen();
                        button.textContent = "EXIT FULLSCREEN";
                    } else {
                        await document.exitFullscreen();
                        button.textContent = "FULLSCREEN";
                    }
                } catch (error) {
                    button.textContent = "FULLSCREEN BLOCKED";
                    setTimeout(() => { button.textContent = document.fullscreenElement ? "EXIT FULLSCREEN" : "FULLSCREEN"; }, 1200);
                }
            });

            document.addEventListener("fullscreenchange", () => {
                button.textContent = document.fullscreenElement ? "EXIT FULLSCREEN" : "FULLSCREEN";
            });
        }

        function setupBannerVisibilityFloat() {
            const panel = document.getElementById("site-banner-panel");
            if (!panel) return;

            if (!("IntersectionObserver" in window)) {
                panel.classList.add("banner-visible");
                return;
            }

            const observer = new IntersectionObserver(entries => {
                const entry = entries[0];
                panel.classList.toggle("banner-visible", !!entry?.isIntersecting && entry.intersectionRatio >= 0.28);
            }, {
                threshold: [0, 0.28, 0.55],
                rootMargin: "-8% 0px -8% 0px"
            });

            observer.observe(panel);
        }

        setSiteViewportHeight();

        const refreshSiteViewportSoon = () => {
            setSiteViewportHeight();
            requestAnimationFrame(setSiteViewportHeight);
            setTimeout(setSiteViewportHeight, 180);
            setTimeout(setSiteViewportHeight, 420);
        };

        window.addEventListener("resize", refreshSiteViewportSoon, { passive: true });
        window.addEventListener("orientationchange", refreshSiteViewportSoon, { passive: true });

        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", refreshSiteViewportSoon, { passive: true });
            window.visualViewport.addEventListener("scroll", refreshSiteViewportSoon, { passive: true });
        }

        pickSiteBanner();
        setupFullscreenButton();
        setupBannerVisibilityFloat();

        const frame = document.getElementById("duelio-frame");
        const loaderStart = performance.now();
        const minLoaderMs = 850;
        let loaderDone = false;

        function finishLoaderOnce() {
            if (loaderDone) return;
            loaderDone = true;
            const elapsed = performance.now() - loaderStart;
            setTimeout(hideSiteLoader, Math.max(0, minLoaderMs - elapsed));
        }

        if (frame) frame.addEventListener("load", finishLoaderOnce, { once: true });
        setTimeout(finishLoaderOnce, 2600);
    </script>
</body>
</html>
